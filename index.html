<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My photo lightbox gallery</title>
   <link rel="stylesheet" href="css/style.css">
   <link href="dist/css/lightbox.css" rel="stylesheet" />
</head>
<body>
    <header>
        <h1>My photo lightbox gallery</h1>
    </header>
    <main> 
        <div class="grid">
            <a href="images/custom_house.jpg"
            data-lightbox="group1"
            data-caption="Custom House">
                <img src="images/custom_house.jpg" width="200" alt="The facade of the Custom House in Dublin">
            </a>

            <a href="images/flour_mill.jpg"
            data-lightbox="group1"
            data-caption="Custom House">
                <img src="images/flour_mill.jpg" width="200" alt="A stone building with 'Boland Flour Mills' painted on its front">
            </a>

            <a href="images/google_building.jpg"
            data-lightbox="group2"
            data-caption="Custom House">
                <img src="images/google_building.jpg" width="200" alt="A small walkway running through the Google office building">
            </a>

            <a href="images/samuel-beckett-bridge.JPG"
            data-lightbox="group2"
            data-caption="Custom House">
                <img src="images/samuel-beckett-bridge.JPG" width="200" alt="The modern, white Samuel Beckett bridge in Dublin with buildings in the background">
            </a>
        </div>
    </main>
    <script src="dist/js/lightbox-plus-jquery.js"></script>
</body>
</html>
